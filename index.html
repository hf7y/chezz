<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chezz</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    font-family: sans-serif;
  }

  /* 9 columns total: column 1 is the 30px rank numbers, columns 2-9 are the 40px squares */
  #board {
    display: grid;
    grid-template-columns: 30px repeat(8, 40px);
  }

  #captured-black {
    min-height: 30px;
    font-size: 20px;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }

  .square {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 25px;
    cursor: pointer;
  }

  .rank-label {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-size: 14px;
    font-weight: bold;
    color: #666;
    padding-right: 8px;
  }

  .light { background: #fdb; }
  .dark { background: #b86; }
  .nine { border-bottom: solid; opacity: 0.3; }
  .selected { outline: 3px solid yellow; }
  #promotion { position: absolute; display: none; border: 1px solid black; background: white; padding: 4px; }
</style>
</head>
<body>

<h1>Chezz</h1>
<div id="board"></div>
<div id="promotion"></div>
<br><a href="/index.html">Reset</a><div id="captured-black"></div>

<script src="engine.js"></script>
<script>
  const SYMBOLS = { K:"♔", Q:"♕", R:"♖", B:"♗", N:"♘", P:"♙", k:"♚", q:"♛", r:"♜", b:"♝", n:"♞", p:"♟" };
  const boardElement = document.getElementById("board");
  const capturedElement = document.getElementById("captured-black");
  const promotionElement = document.getElementById("promotion");

  let state = { board: [], turn: "w", captured: "", floor: 1, spawned: false, seed: 0 };
  let selected = null, promotion = null;
  let rng = () => Math.random(); // replaced with seeded prng on start()

  // --- Seeded PRNG (mulberry32) ---
  function makePrng(seed) {
    let s = seed >>> 0;
    return function() {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) >>> 0;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function loadFen(fen) {
    const parts = fen.split("_");
    state.turn = parts[1] || "w";
    state.board = parts[0].split("-").map(row =>
      row.split("").flatMap(char => "12345678".includes(char) ? Array(Number(char)).fill("") : char)
    );
  }

  function boardToFen() {
    return state.board.map(row => {
      let empty = 0, res = "";
      for (const sq of row) {
        if (sq === "") empty++;
        else { res += (empty ? empty : "") + sq; empty = 0; }
      }
      return res + (empty ? empty : "");
    }).join("-");
  }

  function updateUrl(push = false) {
    const params = new URLSearchParams({ fen: boardToFen() + "_" + state.turn, floor: state.floor, spawned: state.spawned ? "1" : "0" });
    if (state.captured) params.set("captured", state.captured);
    const url = "?" + params.toString();
    if (push) history.pushState(null, "", url); //push is for back button history QOL
    else history.replaceState(null, "", url);
  }

  // Hash a string to a uint32 (djb2)
  function hashStr(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = (Math.imul(h, 33) ^ str.charCodeAt(i)) >>> 0;
    return h;
  }

  function spawnBlackArmy() {
    // Each call site gets a deterministic value derived from the FEN + a counter
    let h = hashStr(boardToFen() + state.floor);
    let callCount = 0;
    function rng() {
      h = (Math.imul(h, 1664525) + 1013904223) >>> 0; // LCG step
      return h / 4294967296;
    }

    let budget = state.floor + Math.floor(rng() * 3) - 1;
    if (budget < 1) budget = 1;

    const pieces = [];
    while (budget > 0) {
      const skip = rng() < 0.3;

      if (budget >= 9 && !skip) { pieces.push("q"); budget -= 9; }
      else if (budget >= 5 && !skip) { pieces.push("r"); budget -= 5; }
      else if (budget >= 3) {
        pieces.push(rng() < 0.5 ? "n" : "b");
        budget -= 3;
      }
      else { pieces.push("p"); budget -= 1; }
    }

    // Deterministic Fisher-Yates shuffle
    for (let i = pieces.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
    }

    let index = 0;
    for (let y = 1; y < 9 && index < pieces.length; y++) {
      for (let x = 0; x < 8 && index < pieces.length; x++) {
        if (state.board[y][x] === "" && rng() > 0.5) {
          state.board[y][x] = pieces[index++];
        }
      }
    }
    state.spawned = true;
  }

  function checkFloorProgression() {
    const exitRow = state.board[0];
    if (!exitRow.includes("K")) { return; }
    newFloor(boardToFen().split("-")[0]);
    state.turn = "w";
  }
 
  function newFloor(survivorsFen) {
    // rank1 = new floor's back rank (row 8), rank2 = one step ahead (row 7)
    // White pawns advance to rank2, leaving rank1 empty in that column.
    // Other white survivors stay on rank1; a captured pawn spawns at rank2 if available.
    let rank1 = "", rank2 = "";
    for (const c of survivorsFen) {
      if ("12345678".includes(c)) { rank1 += c; rank2 += c; continue; }
      if (c === "P") {
        rank1 += "1";
        rank2 += "P";
      } else {
        rank1 += c;
        const pawnIndex = state.captured.indexOf("p");
        if (pawnIndex !== -1) {
          rank2 += "P";
          state.captured = state.captured.slice(0, pawnIndex) + state.captured.slice(pawnIndex + 1);
        } else {
          rank2 += "1";
        }
      }
    }
 
    loadFen("8-8-8-8-8-8-8-" + rank2 + "-" + rank1 + "_" + state.turn);
    state.floor++;
    state.spawned = false;
    spawnBlackArmy();
  }

  function choosePromotion(p) {
    state.captured = state.captured.replace(p.toLowerCase(), "");
    state.board[promotion.y][promotion.x] = p;
    promotion = null; promotionElement.style.display = "none";
    updateUrl(); renderBoard();
  }

  function renderPromotion() {
    promotionElement.innerHTML = "";
    if (!promotion) return;
    promotionElement.style.display = "block";
    const sq = boardElement.children[promotion.y * 9 + promotion.x + 1];
    const r = sq.getBoundingClientRect();
    promotionElement.style.left = r.left + "px"; promotionElement.style.top = (r.top + window.scrollY + 40) + "px";

    [...new Set(state.captured.split("").filter(c => ["q","r","b","n"].includes(c)))].forEach(p => {
      const btn = document.createElement("button");
      btn.textContent = SYMBOLS[p.toUpperCase()];
      btn.onclick = () => choosePromotion(p.toUpperCase());
      promotionElement.appendChild(btn);
    });
  }

  function clickSquare(x, y) {
    if (promotion) return;
    if (!selected) { if (state.board[y][x]) selected = { x, y }; renderBoard(); return; }
    if (!Engine.isLegalMove(state.board, selected.x, selected.y, x, y)) { selected = null; renderBoard(); return; }

    if (state.board[y][x]) state.captured += state.board[y][x];
    state.board[y][x] = state.board[selected.y][selected.x];
    state.board[selected.y][selected.x] = "";
    selected = null; state.turn = "b";

    if (state.board[y][x] === "P" && y === 1 && state.captured.split("").some(c => ["q","r","b","n"].includes(c))) {
      promotion = { x, y }; renderPromotion();
    }
    checkFloorProgression();

    if (state.turn === "b") {
      const bm = Engine.getBlackMovePerformant(state.board);
      if (bm) {
        if (state.board[bm.toY][bm.toX]) state.captured += state.board[bm.toY][bm.toX];
        state.board[bm.toY][bm.toX] = state.board[bm.fromY][bm.fromX];
        state.board[bm.fromY][bm.fromX] = "";
      }
      state.turn = "w";
    }

    // change at end of clickSquare:
    checkFloorProgression(); updateUrl(true); renderBoard();

    // add after renderBoard():
  }

  function renderBoard() {
    const capturedBlack = state.captured.split("").filter(c => c === c.toLowerCase()).map(c => SYMBOLS[c] || "").join(" ");
    capturedElement.textContent = capturedBlack ? capturedBlack : "";

    let html = "";
    for (let y = 0; y < 9; y++) {
      html += `<div class="rank-label">${((state.floor - 1) * 8) + (9 - y)}</div>`;
      for (let x = 0; x < 8; x++) {
        const isSel = selected && selected.x === x && selected.y === y ? " selected" : "";
        const styleClass = `square ${(x + y) % 2 ? 'dark' : 'light'}${y === 0 ? ' nine' : ''}${isSel}`;
        html += `<div class="${styleClass}" onclick="clickSquare(${x},${y})">${SYMBOLS[state.board[y][x]] || ""}</div>`;
      }
    }
    boardElement.innerHTML = html;
  }

  function loadFromUrl() {
    const params = new URLSearchParams(window.location.search);
    state.floor = parseInt(params.get("floor") || "1");
    state.spawned = params.get("spawned") === "1";
    state.captured = params.get("captured") || "";
    loadFen(params.get("fen") || "8-8-8-8-8-8-8-8-4K3_w");
    selected = null; promotion = null;
    promotionElement.style.display = "none";
    renderBoard();
  }

  window.addEventListener("popstate", loadFromUrl);

  function start() {
    const params = new URLSearchParams(window.location.search);
    state.floor = parseInt(params.get("floor") || "1");
    state.spawned = params.get("spawned") === "1";
    state.captured = params.get("captured") || "";
    loadFen(params.get("fen") || "8-8-8-8-8-8-8-8-4K3_w");
    if (!state.spawned) spawnBlackArmy();
    updateUrl(); renderBoard();
  }

  start();
</script>
</body>
</html>
