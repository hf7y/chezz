<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chezz</title>
<style>
  /* 9 columns: a row-number header cell, then 8 board squares. */
  table {
    border-collapse: collapse;
    user-select: none; /* stops drag gestures from text-selecting rank numbers/pieces */
    -webkit-user-select: none;
  }

  td, th {
    width: 40px;
    height: 40px;
    text-align: center;
    vertical-align: middle;
    font-size: 25px;
  }

  th {
    text-align: right;
    padding-right: 8px;
    font-size: 14px;
    color: #666;
  }

  td {
    position: relative;
    cursor: pointer;
    touch-action: none;
  }

  /* Checkerboard: same tr/td nth-child parity is one color, opposite is the other. */
  tr:nth-child(odd) td:nth-child(odd),
  tr:nth-child(even) td:nth-child(even) {
    background: hsl(var(--hue, 30) 45% 55%);
  }
  tr:nth-child(odd) td:nth-child(even),
  tr:nth-child(even) td:nth-child(odd) {
    background: hsl(var(--hue, 30) 45% 78%);
  }

  /* Row 0 is the exit row (reach it with your King to clear the floor). */
  tr:first-child > * { border-bottom: solid; opacity: 0.3; }

  /* A legal destination for the currently-selected piece. */
  td[data-legal]::after {
    content: "";
    position: absolute;
    inset: 50% auto auto 50%;
    width: 12px;
    height: 12px;
    margin: -6px 0 0 -6px;
    border-radius: 50%;
    background: rgba(0, 150, 0, 0.65);
  }

  td[data-selected] { outline: 3px solid yellow; }

  /* King in check: a red glow on the King and on whatever's attacking it. */
  td[data-threat] { box-shadow: 0 0 0 3px red inset, 0 0 10px 3px red; }

  td[data-dragging] { opacity: 0.35; }

  output { font-size: 20px; letter-spacing: 4px; }

  dialog {
    position: absolute;
    margin: 0;
    padding: 4px;
  }

  #instructions { max-width: 380px; font-size: 14px; }
</style>
</head>
<body>

<h1>Chezz</h1>

<p>Captured: <output></output></p>
<table aria-label="Chess board"></table>
<dialog><p>Promote to:</p></dialog>
<menu>
  <a href="/index.html">Reset</a> · <a href="#" onclick="history.back(); return false;">Undo</a>
</menu>
<fieldset>
  <legend>Black AI</legend>
  <label><input type="radio" name="aiMode" value="performant" checked onchange="setAiMode(this.value)"> Performant</label>
  <label><input type="radio" name="aiMode" value="ruthless" onchange="setAiMode(this.value)"> Ruthless</label>
</fieldset>

<details id="instructions">
  <summary>How to play</summary>
  <p>
    Click or drag your White King (♔) and other pieces to move them by standard chess
    rules — reach the top row to clear the floor, and Black replies automatically after
    every move.
  </p>
</details>

<script src="engine.js"></script>
<script>
  const SYMBOLS = { K:"♔", Q:"♕", R:"♖", B:"♗", N:"♘", P:"♙", k:"♚", q:"♛", r:"♜", b:"♝", n:"♞", p:"♟" };
  const boardElement = document.querySelector("table");
  const capturedElement = document.querySelector("output");
  const promotionElement = document.querySelector("dialog");

  let state = { board: [], turn: "w", captured: "", floor: 1, spawned: false, lastSpawnBudget: 0 };
  let selected = null, promotion = null;

  function loadFen(fen) {
    const parts = fen.split("_");
    state.turn = parts[1] || "w";
    state.board = parts[0].split("-").map(row =>
      row.split("").flatMap(char => "12345678".includes(char) ? Array(Number(char)).fill("") : char)
    );
  }

  function boardToFen() {
    return state.board.map(row => {
      let empty = 0, res = "";
      for (const sq of row) {
        if (sq === "") empty++;
        else { res += (empty ? empty : "") + sq; empty = 0; }
      }
      return res + (empty ? empty : "");
    }).join("-");
  }

  function updateUrl(push = false) {
    const params = new URLSearchParams({ fen: boardToFen() + "_" + state.turn, floor: state.floor, spawned: state.spawned ? "1" : "0", budget: state.lastSpawnBudget });
    if (state.captured) params.set("captured", state.captured);
    const url = "?" + params.toString();
    if (push) history.pushState(null, "", url); //push is for back button history QOL
    else history.replaceState(null, "", url);
  }

  // Hash a string to a uint32 (djb2)
  function hashStr(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = (Math.imul(h, 33) ^ str.charCodeAt(i)) >>> 0;
    return h;
  }

  function spawnBlackArmy() {
    // Each call site gets a deterministic value derived from the FEN + a counter
    let h = hashStr(boardToFen() + state.floor);
    let callCount = 0;
    function rng() {
      h = (Math.imul(h, 1664525) + 1013904223) >>> 0; // LCG step
      return h / 4294967296;
    }

    let budget = state.floor + Math.floor(rng() * 3) - 1;
    if (budget < 1) budget = 1;
    // Spawn material should ratchet up, never down, floor to floor.
    if (budget < state.lastSpawnBudget) budget = state.lastSpawnBudget;
    state.lastSpawnBudget = budget;

    const pieces = [];
    while (budget > 0) {
      const skip = rng() < 0.3;

      if (budget >= 9 && !skip) { pieces.push("q"); budget -= 9; }
      else if (budget >= 5 && !skip) { pieces.push("r"); budget -= 5; }
      else if (budget >= 3) {
        pieces.push(rng() < 0.5 ? "n" : "b");
        budget -= 3;
      }
      else { pieces.push("p"); budget -= 1; }
    }

    // Deterministic Fisher-Yates shuffle
    for (let i = pieces.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
    }

    let index = 0;
    for (let y = 1; y < 9 && index < pieces.length; y++) {
      // Randomize this row's column order so placement isn't left-side heavy —
      // a true random pick out of the 8 columns for the first piece inserted,
      // then a random pick of what's left for the next, and so on.
      const cols = [0, 1, 2, 3, 4, 5, 6, 7];
      for (let i = cols.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [cols[i], cols[j]] = [cols[j], cols[i]];
      }
      for (const x of cols) {
        if (index >= pieces.length) break;
        if (state.board[y][x] === "" && rng() > 0.5) {
          state.board[y][x] = pieces[index++];
        }
      }
    }
    state.spawned = true;
  }

  function checkFloorProgression() {
    const exitRow = state.board[0];
    if (!exitRow.includes("K")) { return; }
    newFloor(boardToFen().split("-")[0]);
    state.turn = "w";
  }

  function newFloor(survivorsFen) {
    // rank1 = new floor's back rank (row 8), rank2 = one step ahead (row 7)
    // White pawns advance to rank2, leaving rank1 empty in that column.
    // Other white survivors stay on rank1; a captured pawn spawns at rank2 if available.
    let rank1 = "", rank2 = "";
    for (const c of survivorsFen) {
      if ("12345678".includes(c)) { rank1 += c; rank2 += c; continue; }
      if (c === "P") {
        rank1 += "1";
        rank2 += "P";
      } else {
        rank1 += c;
        const pawnIndex = state.captured.indexOf("p");
        if (pawnIndex !== -1) {
          rank2 += "P";
          state.captured = state.captured.slice(0, pawnIndex) + state.captured.slice(pawnIndex + 1);
        } else {
          rank2 += "1";
        }
      }
    }

    loadFen("8-8-8-8-8-8-8-" + rank2 + "-" + rank1 + "_" + state.turn);
    state.floor++;
    state.spawned = false;
    spawnBlackArmy();
  }

  let promotionResolve = null;

  function choosePromotion(p) {
    state.captured = state.captured.replace(p.toLowerCase(), "");
    state.board[promotion.y][promotion.x] = p;
    promotion = null; promotionElement.close();
    updateUrl(); renderBoard();
    if (promotionResolve) { const resolve = promotionResolve; promotionResolve = null; resolve(); }
  }

  function renderPromotion() {
    promotionElement.innerHTML = "<p>Promote to:</p>";
    if (!promotion) return;
    const sq = boardElement.rows[promotion.y].cells[promotion.x + 1];
    const r = sq.getBoundingClientRect();
    promotionElement.style.left = r.left + "px"; promotionElement.style.top = (r.top + window.scrollY + 40) + "px";

    [...new Set(state.captured.split("").filter(c => ["q","r","b","n"].includes(c)))].forEach(p => {
      const btn = document.createElement("button");
      btn.textContent = SYMBOLS[p.toUpperCase()];
      btn.onclick = () => choosePromotion(p.toUpperCase());
      promotionElement.appendChild(btn);
    });
    promotionElement.showModal();
  }

  const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
  function playSound(name) { /* TODO: hook up real chessboard sound effects (move/capture/promote) */ }

  const AI_ENGINES = { performant: "getBlackMovePerformant", ruthless: "getBlackMoveRuthless" };
  let aiMode = "performant";
  function setAiMode(mode) { aiMode = mode; }

  async function makeMove(fromX, fromY, toX, toY) {
    if (state.board[toY][toX]) state.captured += state.board[toY][toX];
    state.board[toY][toX] = state.board[fromY][fromX];
    state.board[fromY][fromX] = "";
    state.turn = "b";
    playSound("move");

    const promoting = state.board[toY][toX] === "P" && toY === 1 && state.captured.split("").some(c => ["q","r","b","n"].includes(c));
    if (promoting) {
      promotion = { x: toX, y: toY }; renderPromotion();
    }
    checkFloorProgression();
    const blackWillReply = state.turn === "b";
    // Always push a fresh checkpoint here, right after white's move — this is
    // the entry a full turn will collapse into. If black is about to reply, we
    // later REPLACE this same entry with the final state instead of pushing a
    // second one; replacing here instead (and pushing after black) would
    // overwrite the *previous* turn's checkpoint, since replaceState always
    // rewrites whatever entry the browser is currently sitting on — which is
    // exactly what made Undo/back land mid-turn instead of on the prior turn.
    updateUrl(true); renderBoard();

    if (promoting) {
      // Black shouldn't get to move while the promotion choice is still pending —
      // pause here until the player actually picks a piece.
      await new Promise(resolve => { promotionResolve = resolve; });
    }

    if (blackWillReply) {
      // Just long enough to yield back to the browser so White's move actually
      // paints before this blocks the main thread on Black's (now real, and no
      // longer instant) search — not simulating "thinking" anymore, the search
      // itself takes care of that.
      await wait(30);
      const bm = Engine[AI_ENGINES[aiMode]](state.board, state.captured);
      if (bm) {
        if (state.board[bm.toY][bm.toX]) state.captured += state.board[bm.toY][bm.toX];
        const movedPiece = state.board[bm.fromY][bm.fromX];
        state.board[bm.fromY][bm.fromX] = "";
        // Mirrors White's own promotion rule (choosePromotion above): spend a
        // captured piece of the matching type out of the shared state.captured
        // bank rather than a free queen. No UI prompt needed since Black has no
        // human to ask — always take the strongest piece available.
        const promo = Engine.autoPromote(movedPiece, bm.toY, state.captured);
        state.board[bm.toY][bm.toX] = promo.piece;
        state.captured = promo.capturedPool;
        playSound("move");
      }
      state.turn = "w";
      checkFloorProgression(); updateUrl(false); renderBoard();
      await wait(250);
    }
  }

  // The only thing the drag system below touches in here: if a drag just
  // completed, the browser still fires a click on release, and we don't want
  // it to also process as a click. Delete this one guard line if click-to-move
  // is ever removed and only dragging remains.
  let suppressNextClick = false;

  // A cell's board coordinates fall straight out of where it sits in the
  // table — row 0 is the label column (<th>), so x is one less than cellIndex.
  function cellCoords(cell) {
    return { x: cell.cellIndex - 1, y: cell.parentElement.rowIndex };
  }

  function clickSquare(x, y) {
    if (suppressNextClick) { suppressNextClick = false; return; }
    if (promotion) return;
    if (!selected) { if (state.board[y][x]) selected = { x, y }; renderBoard(); return; }
    if (selected.x === x && selected.y === y) { selected = null; renderBoard(); return; }
    if (Engine.isLegalMove(state.board, selected.x, selected.y, x, y)) {
      const from = selected;
      selected = null;
      makeMove(from.x, from.y, x, y);
    } else {
      // Clicking a different one of your pieces switches the selection
      // instead of just deselecting, saving a wasted click.
      selected = state.board[y][x] ? { x, y } : null;
      renderBoard();
    }
  }

  boardElement.addEventListener("click", e => {
    const cell = e.target.closest("td");
    if (cell) { const { x, y } = cellCoords(cell); clickSquare(x, y); }
  });

  window.addEventListener("keydown", e => {
    if (e.key === "Escape" && selected) { selected = null; renderBoard(); }
  });

  // --- Drag-to-move ---
  // Deliberately kept parallel to clickSquare above rather than built on top
  // of it: this only calls the same shared primitives clickSquare does
  // (Engine.isLegalMove, makeMove, renderBoard) and touches clickSquare itself
  // through nothing but the suppressNextClick flag. Either input method can be
  // deleted later without having to untangle the other one.
  const DRAG_THRESHOLD = 6; // px of movement before a press counts as a drag rather than a click
  let drag = null;

  // A single reusable element that follows the pointer during a drag, styled
  // entirely inline since it's the only one of its kind and never sits still
  // long enough to need a stylesheet rule.
  const dragGhost = document.body.appendChild(document.createElement("div"));
  dragGhost.hidden = true;
  Object.assign(dragGhost.style, { position: "fixed", transform: "translate(-50%, -50%)", fontSize: "25px", pointerEvents: "none", zIndex: 1000 });

  function moveGhostTo(clientX, clientY) {
    dragGhost.style.left = clientX + "px";
    dragGhost.style.top = clientY + "px";
  }

  function beginDrag(e) {
    drag.dragging = true;
    selected = { x: drag.x, y: drag.y };
    renderBoard();
    boardElement.rows[drag.y].cells[drag.x + 1].dataset.dragging = "";
    dragGhost.textContent = SYMBOLS[state.board[drag.y][drag.x]] || "";
    dragGhost.hidden = false;
    moveGhostTo(e.clientX, e.clientY);
  }

  function onDragMove(e) {
    if (!drag) return;
    if (!drag.dragging) {
      if (Math.hypot(e.clientX - drag.startX, e.clientY - drag.startY) < DRAG_THRESHOLD) return;
      beginDrag(e);
    }
    moveGhostTo(e.clientX, e.clientY);
  }

  function onDragEnd(e) {
    document.removeEventListener("pointermove", onDragMove);
    if (!drag) return;
    const { x: fromX, y: fromY, dragging } = drag;
    drag = null;
    if (!dragging) return; // plain tap/click: let clickSquare's own onclick handle it

    dragGhost.hidden = true;
    delete boardElement.rows[fromY].cells[fromX + 1].dataset.dragging;
    suppressNextClick = true;
    selected = null;

    const dropCell = document.elementFromPoint(e.clientX, e.clientY)?.closest("td");
    if (dropCell) {
      const { x: toX, y: toY } = cellCoords(dropCell);
      if ((toX !== fromX || toY !== fromY) && Engine.isLegalMove(state.board, fromX, fromY, toX, toY)) {
        makeMove(fromX, fromY, toX, toY);
        return;
      }
    }
    renderBoard();
  }

  boardElement.addEventListener("pointerdown", e => {
    const cell = e.target.closest("td");
    if (!cell || promotion) return;
    const { x, y } = cellCoords(cell);
    if (!state.board[y][x]) return;
    drag = { x, y, startX: e.clientX, startY: e.clientY, dragging: false };
    document.addEventListener("pointermove", onDragMove);
    document.addEventListener("pointerup", onDragEnd, { once: true });
  });

  function renderBoard() {
    const capturedBlack = state.captured.split("").filter(c => c === c.toLowerCase()).map(c => SYMBOLS[c] || "").join(" ");
    capturedElement.textContent = capturedBlack ? capturedBlack : "";

    const legalTargets = new Set(
      (selected ? Engine.legalMovesFrom(state.board, selected.x, selected.y) : []).map(m => `${m.x},${m.y}`)
    );

    // King-in-check indicator: a red glow on the King and on each piece attacking it.
    const king = Engine.findWhiteKing(state.board);
    const attackers = king ? Engine.attackersOf(state.board, king.x, king.y, false) : [];
    const threats = new Set(attackers.length ? [king, ...attackers].map(p => `${p.x},${p.y}`) : []);

    let html = "";
    for (let y = 0; y < 9; y++) {
      const rank = ((state.floor - 1) * 8) + (9 - y);
      const hue = (rank * 10) % 360; // 10deg/rank -> a full color cycle every 4.5 floors
      html += `<tr style="--hue:${hue}"><th scope="row">${rank}</th>`;
      for (let x = 0; x < 8; x++) {
        const sel = selected && selected.x === x && selected.y === y ? " data-selected" : "";
        const threat = threats.has(`${x},${y}`) ? " data-threat" : "";
        const legal = legalTargets.has(`${x},${y}`) ? " data-legal" : "";
        html += `<td${sel}${threat}${legal}>${SYMBOLS[state.board[y][x]] || ""}</td>`;
      }
      html += `</tr>`;
    }
    boardElement.innerHTML = html;
  }

  // Shared by both the initial page load and browser back/forward navigation
  // (popstate) — either way, the board just needs to reflect whatever the URL says.
  function loadFromUrl() {
    const params = new URLSearchParams(window.location.search);
    state.floor = parseInt(params.get("floor") || "1");
    state.spawned = params.get("spawned") === "1";
    state.captured = params.get("captured") || "";
    state.lastSpawnBudget = parseInt(params.get("budget") || "0");
    loadFen(params.get("fen") || "8-8-8-8-8-8-8-8-4K3_w");
    selected = null; promotion = null;
    promotionElement.close();
    if (!state.spawned) spawnBlackArmy();
    updateUrl();
    renderBoard();
  }

  window.addEventListener("popstate", loadFromUrl);
  loadFromUrl();
</script>
</body>
</html>
