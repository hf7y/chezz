name: Deploy to Pages

# narrative-campaign was fast-forwarded into main and retired -- main is now
# the live build, so this triggers on it instead.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages deploys are a single shared target -- queue rather than race two
# concurrent pushes against it.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # index1.html is the whole game (self-contained, no local assets) --
      # Pages just needs it served as index.html at the site root.
      - name: Prepare site
        run: |
          mkdir _site
          cp index1.html _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
